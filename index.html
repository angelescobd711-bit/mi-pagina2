<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Flores Amarillas</title>
    <style>
        /* === RESET Y BLOQUEO DE ZOOM === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5ebe1; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* === PANTALLA DE BOTÓN INICIAL (BLOQUEADO) === */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: #f5ebe1;
            transition: opacity 0.6s ease;
            cursor: pointer;
        }

        .sunflower-icon {
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes cutePop {
            0% { transform: scale(1) rotate(0deg); }
            40% { transform: scale(1.3) rotate(15deg); }
            100% { transform: scale(0) rotate(-20deg); opacity: 0; }
        }

        .click-text {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #5d4037;
            border-bottom: 2px solid #fbc02d;
            padding-bottom: 5px;
        }

        .subtitle-text {
            margin-top: 8px;
            font-size: 1.1rem;
            color: #795548;
            font-weight: 500;
        }

        /* === CONTENIDO PRINCIPAL === */
        #main-content {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex: 1;
            padding: 5vh 20px 0 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Texto superior (BLOQUEADO) */
        #text-zone {
            font-size: 1.15rem;
            line-height: 1.4;
            min-height: 130px;
            margin-bottom: 10px;
        }

        .pumping-heart {
            display: inline-block;
            animation: pumpHeart 0.8s infinite alternate ease-in-out;
        }

        @keyframes pumpHeart {
            0% { transform: scale(1); }
            100% { transform: scale(1.3); }
        }

        /* === ZONA DEL ÁRBOL (BLOQUEADO) === */
        #tree-zone {
            position: relative;
            width: 300px;
            height: 350px;
            margin: 0 auto;
        }

        .trunk-svg {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%); 
            width: 140px;
            height: 150px;
            z-index: 1;
        }

        #heart-container {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 2;
        }

        .sunflower {
            position: absolute;
            width: 16px; 
            height: 16px;
            background-color: #fce029; 
            border-radius: 4px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease;
        }

        .sunflower::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: inherit;
            border-radius: inherit;
            transform: rotate(45deg);
        }

        .sunflower::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6.5px; 
            height: 6.5px;
            background-color: #4a2e1b;
            border-radius: 50%;
            z-index: 2;
        }

        .falling-flower {
            z-index: 3;
            pointer-events: none;
            animation: fallAnimation linear forwards;
        }

        @keyframes fallAnimation {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, 450px) rotate(360deg); opacity: 0; }
        }

        /* === PASTO CON MOVIMIENTO (BLOQUEADO) === */
        #grass-zone {
            position: relative;
            width: 300px;
            height: 30px; 
            margin: -40px auto 10px auto; 
            z-index: 4; 
            overflow: hidden; 
            display: flex;
            align-items: flex-end; 
            justify-content: center;
        }

        .grass-blade {
            width: 3px;
            height: 20px; 
            background-color: #7cb342; 
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            margin: 0 1px; 
            transform-origin: bottom center; 
            animation: windSway 4s ease-in-out infinite;
        }

        .grass-blade:nth-child(even) { background-color: #8bc34a; }
        .grass-blade:nth-child(3n) { background-color: #9ccc65; }

        @keyframes windSway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); } 
        }

        /* === PAJARITOS AZULES (BLOQUEADO) === */
        .bird {
            position: absolute;
            width: 20px; height: 10px;
            background-color: #2196F3; 
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            z-index: 10; 
            display: none; 
        }

        .bird-body { position: relative; width: 100%; height: 100%; }
        
        .bird::before {
            content: ''; position: absolute; top: -4px; left: -3px;
            width: 10px; height: 10px; background-color: #2196F3; border-radius: 50%;
        }

        .bird::after {
            content: ''; position: absolute; top: -1px; left: -6px;
            width: 0; height: 0;
            border-top: 3px solid transparent; border-bottom: 3px solid transparent;
            border-right: 6px solid #FF9800; 
        }

        .bird-eye {
            position: absolute; top: -2px; left: -1px;
            width: 2px; height: 2px; background-color: black; border-radius: 50%; z-index: 11;
        }

        .bird-wing {
            position: absolute; top: -3px; left: 4px;
            width: 10px; height: 8px; background-color: #64B5F6;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            transform-origin: bottom right; transform: rotate(-10deg);
        }

        .bird-wing.flapping { animation: flap 0.15s infinite alternate linear; }
        @keyframes flap {
            0% { transform: rotate(0deg) scaleY(1); }
            100% { transform: rotate(-50deg) scaleY(0.4); }
        }

        .bird.face-right { transform: scaleX(-1); }

        .bird.perched { animation: birdPerchBreathe 3s ease-in-out infinite; }
        @keyframes birdPerchBreathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.08); }
        }
        
        .bird.perched.face-right { animation: birdPerchBreatheRight 3s ease-in-out infinite; }
        @keyframes birdPerchBreatheRight {
            0%, 100% { transform: scaleX(-1) scaleY(1); }
            50% { transform: scaleX(-1) scaleY(1.08); }
        }

        /* === HELLO KITTY ANIMADA (CUTE) === */
        #kitty-zone {
            position: fixed;
            bottom: 60px; /* Alineado con el contador */
            left: -150px; /* Fuera de la pantalla inicialmente (izquierda) */
            width: 120px;
            height: 120px;
            z-index: 50; /* Detrás del pasto */
            pointer-events: none; /* No interfiere con clics */
            display: none; /* Oculto hasta que inicia */
            transition: left 6s linear, opacity 1s; /* Transición suave de caminata */
        }

        .kitty-body { position: relative; width: 100%; height: 100%; }

        /* Ilustración SVG de Hello Kitty blindada */
        .kitty-svg {
            position: absolute; bottom: 0; left: 0;
            width: 80px; height: 80px; z-index: 1;
        }

        /* Sombrilla cute blindada */
        .parasol-svg {
            position: absolute; top: -30px; left: -20px;
            width: 100px; height: 100px; z-index: 0;
            transform-origin: center bottom;
            animation: parasolWobble 4s infinite alternate; /* Balanceo tierno */
        }

        @keyframes parasolWobble {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Animación de caminata rítmica (Cute Walk) */
        .kitty-walking {
            animation: kittyStepWobble 0.6s infinite alternate linear; /* Balanceo tierno */
        }

        @keyframes kittyStepWobble {
            0% { transform: rotate(-3deg) translateY(0px); }
            100% { transform: rotate(3deg) translateY(-3px); }
        }

        /* GUIÑO INTERMITENTE CUTE */
        .kitty-svg .wink-eye {
            opacity: 0;
            animation: kittyWink 3s infinite alternate;
        }

        @keyframes kittyWink {
            0%, 90% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* CORAZÓN FLOTANTE CUTE */
        #kitty-heart {
            position: absolute;
            top: -20px; left: 30px;
            font-size: 20px;
            color: #ff80ab; /* Rosa Pastel Cute */
            opacity: 0;
            pointer-events: none;
        }

        .heart-float {
            animation: kittyHeartFloat 2.5s ease-out;
        }

        @keyframes kittyHeartFloat {
            0% { transform: translateY(0px) scale(0.5); opacity: 0; }
            20% { transform: translateY(-10px) scale(1); opacity: 1; }
            80% { transform: translateY(-30px) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(1); opacity: 0; }
        }

        /* === RECUADRO DEL CONTADOR (BLOQUEADO) === */
        #counter-zone {
            width: 98%; 
            max-width: 480px;
            margin: 30px auto 40px auto; 
            padding: 15px 5px;
            border: 2px solid #5d4037; 
            border-radius: 12px; 
            background-color: #ffffff; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; 
        }

        .counter-title { 
            font-size: 1rem; 
            margin-bottom: 8px; 
            display: block; 
            color: #5d4037; 
        }
        
        #timer { 
            font-size: 1.05rem; 
            font-weight: 500; 
            letter-spacing: 0.2px; 
            color: #1a1a1a; 
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="iniciarExperiencia()">
        <div class="sunflower-icon">🌻</div>
        <div class="click-text">Para Ti Hermosa ♡</div>
        <div class="subtitle-text">-Fersita 💕</div>
    </div>

    <div id="main-content">
        <div id="text-zone"></div>

        <div id="tree-zone">
            <svg class="trunk-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M 35 100 C 40 80, 45 60, 45 40 C 35 30, 20 25, 10 20 C 20 25, 35 35, 45 40 C 45 25, 40 10, 35 0 C 45 15, 50 30, 50 40 C 60 30, 75 25, 85 20 C 75 25, 60 35, 52 42 C 55 60, 60 80, 65 100 Z" fill="#6b4226"/>
            </svg>
            <div id="heart-container"></div>
        </div>

        <div id="grass-zone"></div>

        <div id="counter-zone">
            <span class="counter-title">Me Enamoré De Ti Desde Hace..</span>
            <div id="timer">Calculando...</div>
        </div>
    </div>

    <div id="kitty-zone">
        <div class="kitty-body">
            <svg class="parasol-svg" viewBox="0 0 100 100">
                <path d="M50 85 C50 60, 50 30, 50 15 Z" stroke="#6b4226" stroke-width="2" fill="none"/>
                <path d="M10 40 Q50 10, 90 40 L50 85 Z" fill="#ffffff" stroke="#ff80ab" stroke-width="1.5"/>
                <path d="M10 40 C10 45, 15 45, 15 40 M25 40 C25 45, 30 45, 30 40 M40 40 C40 45, 45 45, 45 40 M55 40 C55 45, 60 45, 60 40 M70 40 C70 45, 75 45, 75 40 M85 40 C85 45, 90 45, 90 40 Z" fill="none" stroke="#ff80ab" stroke-width="1"/>
            </svg>
            
            <svg class="kitty-svg" viewBox="0 0 100 100">
                <path d="M25 80 Q50 95, 75 80 L65 55 Q50 65, 35 55 Z" fill="#fffef0" stroke="#ffc107" stroke-width="1.5"/>
                <circle cx="50" cy="40" r="30" fill="#fff" stroke="#ffc107" stroke-width="1.5"/>
                <path d="M25 25 Q15 20, 20 10 Z" fill="#fff" stroke="#ffc107" stroke-width="1.5"/>
                <path d="M75 25 Q85 20, 80 10 Z" fill="#fff" stroke="#ffc107" stroke-width="1.5"/>
                <circle cx="42" cy="45" r="3" fill="#000"/>
                <circle cx="58" cy="45" r="3" fill="#000" id="right-eye"/>
                <rect x="55" y="44" width="6" height="3" fill="#fff" class="wink-eye"/>
                <ellipse cx="50" cy="50" rx="3.5" ry="2.5" fill="#ffeb3b" stroke="#ff9800" stroke-width="1"/>
                <path d="M35 58 Q38 58, 41 58 M35 63 Q38 63, 41 63" stroke="#000" stroke-width="1" fill="none"/>
                <path d="M65 58 Q62 58, 59 58 M65 63 Q62 63, 59 63" stroke="#000" stroke-width="1" fill="none"/>
                <path d="M68 20 A8 8 0 0 1 80 20 A8 8 0 0 1 68 20 Z M74 20 L74 28" fill="#ff4081" stroke="#c2185b" stroke-width="1.5"/>
                <path d="M35 80 L35 90 M65 80 L65 90 Z" stroke="#ffc107" stroke-width="1.5" fill="none" id="kitty-feet"/>
            </svg>
            
            <span id="kitty-heart">💗</span>
        </div>
    </div>

    <script>
        const startDate = new Date(2025, 11, 1, 0, 0, 0); 
        const messageHTML = "<div style='text-align: center; font-weight: bold; margin-bottom: 10px;'>Flores Amarillas Para Mí Linda 💕:</div>Si pudiera elegir donde estar en estos momentos, sería a tu lado siendo felices. ❤️‍🩹<br><br>Porque cuando hablo contigo todo se vuelve perfectamente lindo y mi amor por ti crece aún más <span class='pumping-heart'>💗</span><br><br>Teamito! 💖";

        let charIndex = 0;
        let staticFlowers = []; 
        let staticBirds = []; 

        function iniciarExperiencia() {
            const startScreen = document.getElementById('start-screen');
            const icon = document.querySelector('.sunflower-icon');
            startScreen.onclick = null;
            icon.style.animation = 'cutePop 0.6s ease forwards';
            
            setTimeout(() => {
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    document.getElementById('main-content').style.display = 'flex';
                    typeWriterText();
                    drawHeart(); 
                    createGrass(); 
                    initializeBirdsCycle(); 
                    
                    // INICIAR HELLO KITTY (CUTE)
                    setTimeout(initializeKittyCycle, 1000); // 1s después de que carga
                    
                    setTimeout(startFallingFlowers, 3500); 
                    actualizarContador();
                    setInterval(actualizarContador, 1000);
                }, 600); 
            }, 400); 
        }

        // ESCRITURA TEXTO (BLOQUEADO)
        function typeWriterText() {
            if (charIndex < messageHTML.length) {
                if (messageHTML.charAt(charIndex) === '<') {
                    while (messageHTML.charAt(charIndex) !== '>') { charIndex++; }
                }
                document.getElementById('text-zone').innerHTML = messageHTML.substring(0, charIndex + 1);
                charIndex++;
                setTimeout(typeWriterText, 45); 
            }
        }

        // DIBUJAR CORAZÓN (BLOQUEADO)
        function drawHeart() {
            const container = document.getElementById('heart-container');
            const centerX = 138; const centerY = 135; const scaleX = 78; const scaleY = 82; 
            const step = 0.15; const rowSpacing = step * 0.866; 
            let row = 0;
            for (let y = -1.5; y <= 1.5; y += rowSpacing) {
                let offsetX = (row % 2 === 0) ? 0 : step / 2;
                for (let x = -1.5; x <= 1.5; x += step) {
                    let jx = x + offsetX - (step / 4); let jy = y;
                    if (Math.pow(jx*jx + jy*jy - 1, 3) - jx*jx * Math.pow(jy, 3) <= 0) {
                        let px = centerX + jx * scaleX; let py = centerY - jy * scaleY;
                        let flower = document.createElement('div');
                        flower.className = 'sunflower';
                        flower.style.left = px + 'px'; flower.style.top = py + 'px';
                        let randomScale = 0.75 + Math.random() * 0.5;
                        let randomRotate = Math.random() * 360;
                        flower.style.transform = `translate(-50%, -50%) rotate(${randomRotate}deg) scale(${randomScale})`;
                        flower.style.opacity = '0'; 
                        container.appendChild(flower);
                        staticFlowers.push(flower);
                    }
                }
                row++;
            }
            staticFlowers.sort(() => Math.random() - 0.5).forEach((f, idx) => {
                setTimeout(() => { f.style.opacity = '1'; }, idx * 5); 
            });
        }

        // CREAR PASTO (BLOQUEADO)
        function createGrass() {
            const container = document.getElementById('grass-zone');
            for (let i = 0; i < 60; i++) {
                let blade = document.createElement('div');
                blade.className = 'grass-blade';
                blade.style.height = (15 + Math.random() * 15) + 'px';
                blade.style.animationDelay = Math.random() * 4 + 's';
                blade.style.animationDuration = (3 + Math.random() * 2) + 's';
                container.appendChild(blade);
            }
        }

        // CICLO PAJARITOS (BLOQUEADO, REGRESO RÁPIDO)
        function initializeBirdsCycle() {
            const treeZone = document.getElementById('tree-zone');
            const perchPositions = [
                { id: 1, startX: -150, endX: 450, branchX: 95, branchY: 212, arriveFace: 'right', leaveFace: 'right' },
                { id: 2, startX: 450, endX: -150, branchX: 185, branchY: 212, arriveFace: 'left', leaveFace: 'left' }
            ];
            perchPositions.forEach(pos => {
                let bird = document.createElement('div');
                bird.className = `bird`; bird.id = `bird-${pos.id}`;
                let body = document.createElement('div'); body.className = 'bird-body';
                let wing = document.createElement('div'); wing.className = 'bird-wing';
                let eye = document.createElement('div'); eye.className = 'bird-eye';
                body.appendChild(wing); body.appendChild(eye);
                bird.appendChild(body); treeZone.appendChild(bird);
                staticBirds.push({ element: bird, wingEl: wing, data: pos });
            });
            staticBirds.forEach(birdObj => startBirdCycleController(birdObj));
        }

        function startBirdCycleController(birdObj) {
            function arriveAndPerch() {
                const element = birdObj.element; const wing = birdObj.wingEl; const pos = birdObj.data;
                element.style.display = 'block'; element.style.left = pos.startX + 'px'; element.style.top = '-50px'; 
                if (pos.arriveFace === 'right') { element.classList.add('face-right'); } else { element.classList.remove('face-right'); }
                wing.classList.add('flapping'); element.offsetHeight; 
                element.style.transition = 'left 3s ease-out, top 3s ease-out';
                element.style.left = pos.branchX + 'px'; element.style.top = pos.branchY + 'px';
                setTimeout(() => { element.style.transition = ''; element.classList.add('perched'); wing.classList.remove('flapping'); }, 3050);
                setTimeout(leave, 15000); 
            }
            function leave() {
                const element = birdObj.element; const wing = birdObj.wingEl; const pos = birdObj.data;
                element.classList.remove('perched'); wing.classList.add('flapping'); 
                if (pos.leaveFace === 'right') { element.classList.add('face-right'); } else { element.classList.remove('face-right'); }
                element.offsetHeight; element.style.transition = 'left 2.5s ease-in, top 2.5s ease-in';
                element.style.left = pos.endX + 'px'; element.style.top = '-50px';
                setTimeout(resetAndWait, 2550); 
            }
            function resetAndWait() {
                const element = birdObj.element; const wing = birdObj.wingEl;
                element.style.display = 'none'; element.style.transition = ''; wing.classList.remove('flapping');
                // REGRESO RÁPIDO (5-10s)
                const waitTime = 5000 + Math.random() * 5000;
                setTimeout(arriveAndPerch, waitTime); 
            }
            setTimeout(arriveAndPerch, (2000 + Math.random() * 3000));
        }

        // === NUEVO CICLO HELLO KITTY (CUTE Y BLINDADO) ===
        function initializeKittyCycle() {
            const kittyZone = document.getElementById('kitty-zone');
            const kittyHeart = document.getElementById('kitty-heart');
            
            // Coordenada final centrada bajo el tronco
            const finalX = (window.innerWidth / 2) - 60; // Mitad - ancho/2
            
            function arrive() {
                // Paso 1: Configurar llegada
                kittyZone.style.display = 'block';
                kittyZone.style.left = '-150px'; /* Start outside */
                kittyZone.style.transition = 'left 6s linear, opacity 1s'; /* Transición caminata */
                
                // Activar animación cute walk (wobble)
                kittyZone.classList.add('kitty-walking');
                
                // Paso 2: Caminar al centro
                setTimeout(() => {
                    kittyZone.style.left = finalX + 'px';
                }, 100);

                // Paso 3: Detenerse y cute actions
                setTimeout(() => {
                    kittyZone.classList.remove('kitty-walking'); // Detiene caminata
                    
                    // Cute action 1: Heart float
                    kittyHeart.classList.add('heart-float');
                    
                    // Cute action 2: Wink (handled by CSS animation)
                }, 6100); // 6s de caminata + 0.1s de delay

                // Paso 4: Permanecer 20s posada y luego irse
                setTimeout(leave, 26000); // 6s de caminata + 20s posada
            }

            function leave() {
                // Cute action clean up
                kittyHeart.classList.remove('heart-float');
                
                // Paso 5: Activar cute walk y marchar
                kittyZone.classList.add('kitty-walking');
                kittyZone.style.left = (window.innerWidth + 50) + 'px'; /* Salir por derecha */
                
                // Paso 6: Ocultar y programar regreso periódicamente
                setTimeout(() => {
                    kittyZone.style.display = 'none';
                    kittyZone.classList.remove('kitty-walking');
                    
                    // Regresa periódicamente (30-50 segundos aleatorios)
                    const waitTime = 30000 + Math.random() * 20000;
                    setTimeout(arrive, waitTime);
                }, 6000); // Tiempo de caminata salida
            }

            // Iniciar ciclo por primera vez
            arrive();
        }

        function startFallingFlowers() {
            const container = document.getElementById('heart-container');
            setInterval(() => {
                if (staticFlowers.length === 0) return;
                const sourceFlower = staticFlowers[Math.floor(Math.random() * staticFlowers.length)];
                let falling = document.createElement('div');
                falling.className = 'sunflower falling-flower';
                falling.style.left = sourceFlower.style.left; falling.style.top = sourceFlower.style.top;
                let duration = 3 + Math.random() * 3; falling.style.animationDuration = duration + 's';
                container.appendChild(falling);
                setTimeout(() => { falling.remove(); }, duration * 1000);
            }, 300); 
        }

        // CONTADOR (BLOQUEADO)
        function actualizarContador() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerHTML = `${d} días ${h} horas ${m} minutos ${s} segundos`;
        }
    </script>
</body>
</html>
