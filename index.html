<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Flores Amarillas</title>
    <style>
        /* === RESET Y BLOQUEO DE ZOOM === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5ebe1; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* === PANTALLA DE BOTÓN INICIAL (BLOQUEADO) === */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: #f5ebe1;
            transition: opacity 0.5s ease;
            cursor: pointer;
        }

        .sunflower-icon {
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .click-text {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #5d4037;
            border-bottom: 2px solid #fbc02d;
            padding-bottom: 5px;
        }

        /* === CONTENIDO PRINCIPAL === */
        #main-content {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex: 1;
            padding: 5vh 20px 40px 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Texto superior (BLOQUEADO) */
        #text-zone {
            font-size: 1.15rem;
            line-height: 1.4;
            min-height: 130px;
            margin-bottom: 10px;
        }

        .blinking {
            font-weight: bold;
            display: inline-block;
            animation: blinker 1.5s infinite;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* === ZONA DEL ÁRBOL (BLOQUEADO) === */
        #tree-zone {
            position: relative;
            width: 300px;
            height: 350px;
            margin: 0 auto;
        }

        /* Tronco Centrado (BLOQUEADO) */
        .trunk-svg {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%); 
            width: 140px;
            height: 150px;
            z-index: 1;
        }

        /* Contenedor del Corazón (BLOQUEADO) */
        #heart-container {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 2;
        }

        /* Girasoles Individuales (BLOQUEADO) */
        .sunflower {
            position: absolute;
            width: 16px; 
            height: 16px;
            background-color: #fce029; 
            border-radius: 4px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease;
        }

        .sunflower::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: inherit;
            border-radius: inherit;
            transform: rotate(45deg);
        }

        .sunflower::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6.5px; 
            height: 6.5px;
            background-color: #4a2e1b;
            border-radius: 50%;
            z-index: 2;
        }

        /* Animación de caída (BLOQUEADO) */
        .falling-flower {
            z-index: 3;
            pointer-events: none;
            animation: fallAnimation linear forwards;
        }

        @keyframes fallAnimation {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, 450px) rotate(360deg); opacity: 0; }
        }

        /* === NUEVO: ZONA DE PASTO CON MOVIMIENTO === */
        #grass-zone {
            position: relative;
            width: 300px;
            height: 30px; /* Altura del pasto */
            margin: -5px auto 10px auto; /* Lo pega un poco al árbol */
            overflow: hidden; /* Corta lo que sobresale de la base */
            display: flex;
            align-items: flex-end; /* Pasto sale de abajo */
            justify-content: center;
        }

        .grass-blade {
            width: 3px;
            height: 20px; /* Altura base, se variará con JS */
            background-color: #7cb342; /* Verde base orgánico */
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            margin: 0 1px; /* Espacio entre hojas */
            transform-origin: bottom center; /* Balanceo desde la base */
            animation: windSway 4s ease-in-out infinite;
        }

        /* Variaciones de color para naturalidad */
        .grass-blade:nth-child(even) { background-color: #8bc34a; }
        .grass-blade:nth-child(3n) { background-color: #9ccc65; }

        /* Animación de balanceo suave (viento) */
        @keyframes windSway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); } /* Inclinación hacia la derecha */
        }

        /* === CONTADOR (BLOQUEADO) === */
        #counter-zone {
            width: 100%;
            margin-top: auto; 
            padding-top: 20px;
        }

        .divider-line {
            width: 100%;
            height: 1.5px;
            background-color: #1a1a1a;
            margin: 10px 0;
        }

        .counter-title { font-size: 1rem; margin-bottom: 5px; display: block; }
        #timer { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="start-screen" onclick="iniciarExperiencia()">
        <div class="sunflower-icon">🌻</div>
        <div class="click-text">Flores Para Ti</div>
    </div>

    <div id="main-content">
        <div id="text-zone"></div>

        <div id="tree-zone">
            <svg class="trunk-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M 35 100 C 40 80, 45 60, 45 40 C 35 30, 20 25, 10 20 C 20 25, 35 35, 45 40 C 45 25, 40 10, 35 0 C 45 15, 50 30, 50 40 C 60 30, 75 25, 85 20 C 75 25, 60 35, 52 42 C 55 60, 60 80, 65 100 Z" fill="#6b4226"/>
            </svg>
            <div id="heart-container"></div>
        </div>

        <div id="grass-zone"></div>

        <div id="counter-zone">
            <div class="divider-line"></div>
            <span class="counter-title">Mi amor por ti comenzó hace...</span>
            <div id="timer">Calculando...</div>
            <div class="divider-line"></div>
        </div>
    </div>

    <script>
        const startDate = new Date(2025, 11, 1, 0, 0, 0); 
        const message = "Flores Amarillas para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! —";

        let charIndex = 0;
        let staticFlowers = []; 

        function iniciarExperiencia() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
                typeWriterText();
                drawHeart(); 
                createGrass(); // Genera el pasto al iniciar
                
                setTimeout(startFallingFlowers, 3500); 
                
                actualizarContador();
                setInterval(actualizarContador, 1000);
            }, 500);
        }

        function typeWriterText() {
            if (charIndex < message.length) {
                const char = message.charAt(charIndex);
                if (message.substring(charIndex, charIndex + 17) === "— I Love You! —") {
                    document.getElementById('text-zone').innerHTML += '<span class="blinking">I Love You!</span>';
                    charIndex += 17;
                } else {
                    document.getElementById('text-zone').innerHTML += char === '\n' ? '<br>' : char;
                    charIndex++;
                }
                setTimeout(typeWriterText, 60);
            }
        }

        // === DIBUJAR CORAZÓN (BLOQUEADO) ===
        function drawHeart() {
            const container = document.getElementById('heart-container');
            const centerX = 138; 
            const centerY = 135; 
            const scaleX = 78; 
            const scaleY = 82; 
            
            const step = 0.15;
            const rowSpacing = step * 0.866; 

            let row = 0;

            for (let y = -1.5; y <= 1.5; y += rowSpacing) {
                let offsetX = (row % 2 === 0) ? 0 : step / 2;
                
                for (let x = -1.5; x <= 1.5; x += step) {
                    let jx = x + offsetX - (step / 4);
                    let jy = y;

                    if (Math.pow(jx*jx + jy*jy - 1, 3) - jx*jx * Math.pow(jy, 3) <= 0) {
                        
                        let px = centerX + jx * scaleX;
                        let py = centerY - jy * scaleY;

                        let flower = document.createElement('div');
                        flower.className = 'sunflower';
                        flower.style.left = px + 'px';
                        flower.style.top = py + 'px';
                        
                        let randomScale = 0.75 + Math.random() * 0.5;
                        let randomRotate = Math.random() * 360;
                        flower.style.transform = `translate(-50%, -50%) rotate(${randomRotate}deg) scale(${randomScale})`;
                        flower.style.opacity = '0'; 
                        
                        container.appendChild(flower);
                        staticFlowers.push(flower);
                    }
                }
                row++;
            }

            staticFlowers.sort(() => Math.random() - 0.5).forEach((f, idx) => {
                setTimeout(() => {
                    f.style.opacity = '1';
                }, idx * 5); 
            });
        }

        // === NUEVO: LÓGICA PARA GENERAR PASTO ORGÁNICO ===
        function createGrass() {
            const container = document.getElementById('grass-zone');
            const numBlades = 60; // Cantidad de hojas de pasto

            for (let i = 0; i < numBlades; i++) {
                let blade = document.createElement('div');
                blade.className = 'grass-blade';
                
                // Variaciones orgánicas aleatorias
                let randomHeight = 15 + Math.random() * 15; // Alturas entre 15px y 30px
                let randomDelay = Math.random() * 4; // Retraso de animación para que no se muevan todas igual
                let randomDuration = 3 + Math.random() * 2; // Velocidad del viento variada

                blade.style.height = randomHeight + 'px';
                blade.style.animationDelay = randomDelay + 's';
                blade.style.animationDuration = randomDuration + 's';

                container.appendChild(blade);
            }
        }

        // === CAÍDA GIRASOLES (BLOQUEADO) ===
        function startFallingFlowers() {
            const container = document.getElementById('heart-container');
            
            setInterval(() => {
                if (staticFlowers.length === 0) return;
                
                const sourceFlower = staticFlowers[Math.floor(Math.random() * staticFlowers.length)];
                
                let falling = document.createElement('div');
                falling.className = 'sunflower falling-flower';
                falling.style.left = sourceFlower.style.left;
                falling.style.top = sourceFlower.style.top;
                
                let duration = 3 + Math.random() * 3; 
                falling.style.animationDuration = duration + 's';
                
                container.appendChild(falling);
                
                setTimeout(() => {
                    falling.remove();
                }, duration * 1000);
            }, 300); 
        }

        // === RELOJ (BLOQUEADO) ===
        function actualizarContador() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            document.getElementById('timer').innerHTML = 
                `${d} días ${h} horas ${m} minutos ${s} segundos _`;
        }
    </script>
</body>
</html>
