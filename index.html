<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Flores Amarillas</title>
    <style>
        /* === RESET Y BLOQUEO DE ZOOM PARA IPHONE === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5ebe1; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* === PANTALLA DE BOTÓN INICIAL (Intacta) === */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: #f5ebe1;
            transition: opacity 0.5s ease;
            cursor: pointer;
        }

        .sunflower-icon {
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .click-text {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #5d4037;
            border-bottom: 2px solid #fbc02d;
            padding-bottom: 5px;
        }

        /* === CONTENIDO PRINCIPAL === */
        #main-content {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex: 1;
            padding: 5vh 20px 40px 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Texto superior */
        #text-zone {
            font-size: 1.15rem;
            line-height: 1.4;
            min-height: 130px;
            margin-bottom: 10px;
        }

        .blinking {
            font-weight: bold;
            display: inline-block;
            animation: blinker 1.5s infinite;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* === ZONA DEL ÁRBOL === */
        #tree-zone {
            position: relative;
            width: 300px;
            height: 350px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }

        /* TRONCO INTACTO: Justo como lo dejaste */
        .trunk-svg {
            position: absolute;
            bottom: 10px;
            width: 150px;
            height: 180px;
            z-index: 1;
        }

        /* Contenedor del Corazón */
        #heart-container {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 2;
        }

        /* Girasoles Individuales Estilo 🌼 (Tamaño ajustado para no empalmar) */
        .sunflower {
            position: absolute;
            width: 15px; 
            height: 15px;
            background-color: #fce029; 
            border-radius: 3px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease;
        }

        .sunflower::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: inherit;
            border-radius: inherit;
            transform: rotate(45deg);
        }

        .sunflower::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 7px;
            height: 7px;
            background-color: #4a2e1b;
            border-radius: 50%;
            z-index: 2;
        }

        /* Animación de caída */
        .falling-flower {
            z-index: 3;
            pointer-events: none;
            animation: fallAnimation linear forwards;
        }

        @keyframes fallAnimation {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, 450px) rotate(360deg); opacity: 0; }
        }

        /* === CONTADOR === */
        #counter-zone {
            width: 100%;
            margin-top: auto;
            padding-top: 20px;
        }

        .divider-line {
            width: 100%;
            height: 1.5px;
            background-color: #1a1a1a;
            margin: 10px 0;
        }

        .counter-title { font-size: 1rem; margin-bottom: 5px; display: block; }
        #timer { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="start-screen" onclick="iniciarExperiencia()">
        <div class="sunflower-icon">🌻</div>
        <div class="click-text">Flores Para Ti</div>
    </div>

    <div id="main-content">
        <div id="text-zone"></div>

        <div id="tree-zone">
            <svg class="trunk-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <line x1="50" y1="100" x2="50" y2="45" stroke="#6b4226" stroke-width="6" stroke-linecap="round"/>
                <line x1="50" y1="75" x2="15" y2="35" stroke="#6b4226" stroke-width="4" stroke-linecap="round"/>
                <line x1="50" y1="75" x2="85" y2="35" stroke="#6b4226" stroke-width="4" stroke-linecap="round"/>
                <line x1="38" y1="61" x2="35" y2="30" stroke="#6b4226" stroke-width="3" stroke-linecap="round"/>
                <line x1="62" y1="61" x2="65" y2="30" stroke="#6b4226" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <div id="heart-container"></div>
        </div>

        <div id="counter-zone">
            <div class="divider-line"></div>
            <span class="counter-title">Mi amor por ti comenzó hace...</span>
            <div id="timer">Calculando...</div>
            <div class="divider-line"></div>
        </div>
    </div>

    <script>
        const startDate = new Date(2025, 11, 1, 0, 0, 0); 
        const message = "Flores Amarillas para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! —";

        let charIndex = 0;
        let staticFlowers = []; 

        function iniciarExperiencia() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
                typeWriterText();
                drawHeart(); // Relleno con silueta perfecta
                
                setTimeout(startFallingFlowers, 3500); 
                
                actualizarContador();
                setInterval(actualizarContador, 1000);
            }, 500);
        }

        function typeWriterText() {
            if (charIndex < message.length) {
                const char = message.charAt(charIndex);
                if (message.substring(charIndex, charIndex + 17) === "— I Love You! —") {
                    document.getElementById('text-zone').innerHTML += '<span class="blinking">I Love You!</span>';
                    charIndex += 17;
                } else {
                    document.getElementById('text-zone').innerHTML += char === '\n' ? '<br>' : char;
                    charIndex++;
                }
                setTimeout(typeWriterText, 60);
            }
        }

        // === SILUETA DE CORAZÓN PERFECTA (PATRÓN DE PANAL) ===
        // Esto garantiza que el borde sea nítido como el corazón rojo y que las flores no se amontonen.
        function drawHeart() {
            const container = document.getElementById('heart-container');
            const centerX = 150; 
            const centerY = 135; // Alineado sobre tu tronco
            const scale = 85; // Escala grande para que la figura se vea clara
            
            // "step" es la distancia entre flores. Al ser 0.19, deja un espacio respirable
            // entre las flores de 15px, evitando el efecto de "bulto abrumado".
            const step = 0.19; 
            const rowSpacing = step * 0.866; // Altura matemática de un hexágono para encaje perfecto

            let row = 0;

            // Recorremos la cuadrícula de arriba a abajo
            for (let y = -1.2; y <= 1.3; y += rowSpacing) {
                // Desfase para crear el patrón de panal (intercalado)
                let offsetX = (row % 2 === 0) ? 0 : step / 2;
                
                for (let x = -1.3; x <= 1.3; x += step) {
                    let jx = x + offsetX;
                    let jy = y;

                    // Si la posición exacta está dentro de la silueta perfecta del corazón
                    if (Math.pow(jx*jx + jy*jy - 1, 3) - jx*jx * Math.pow(jy, 3) <= 0) {
                        
                        let px = centerX + jx * scale;
                        let py = centerY - jy * scale; 

                        let flower = document.createElement('div');
                        flower.className = 'sunflower';
                        flower.style.left = px + 'px';
                        flower.style.top = py + 'px';
                        // Rotación individual aleatoria para un toque orgánico
                        flower.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 360}deg)`;
                        flower.style.opacity = '0'; 
                        
                        container.appendChild(flower);
                        staticFlowers.push(flower);
                    }
                }
                row++;
            }

            // Aparecen en desorden para la animación
            staticFlowers.sort(() => Math.random() - 0.5).forEach((f, idx) => {
                setTimeout(() => {
                    f.style.opacity = '1';
                }, idx * 6); 
            });
        }

        function startFallingFlowers() {
            const container = document.getElementById('heart-container');
            
            setInterval(() => {
                if (staticFlowers.length === 0) return;
                
                const sourceFlower = staticFlowers[Math.floor(Math.random() * staticFlowers.length)];
                
                let falling = document.createElement('div');
                falling.className = 'sunflower falling-flower';
                falling.style.left = sourceFlower.style.left;
                falling.style.top = sourceFlower.style.top;
                
                let duration = 3 + Math.random() * 3; 
                falling.style.animationDuration = duration + 's';
                
                container.appendChild(falling);
                
                setTimeout(() => {
                    falling.remove();
                }, duration * 1000);
            }, 300); 
        }

        function actualizarContador() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            document.getElementById('timer').innerHTML = 
                `${d} días ${h} horas ${m} minutos ${s} segundos _`;
        }
    </script>
</body>
</html>
