<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Flores Amarillas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5ebe1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: #f5ebe1;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 12px 24px;
            font-size: 1.1rem;
            border: 1.5px solid #1a1a1a;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
        }

        #main-content {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex: 1;
            padding: 5vh 20px 40px 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        #text-zone {
            font-size: 1.15rem;
            line-height: 1.4;
            min-height: 130px;
            margin-bottom: 10px;
        }

        /* --- ZONA DEL ÁRBOL EXACTA --- */
        #tree-zone {
            position: relative;
            width: 300px;
            height: 320px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }

        .trunk-svg {
            position: absolute;
            bottom: 0;
            width: 80px;
            height: 130px;
            z-index: 1;
        }

        #heart-container {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
        }

        .sunflower {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #fce029;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            transition: opacity 0.4s ease;
        }

        .sunflower::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background-color: #4a2e1b;
            border-radius: 50%;
        }

        .falling-flower {
            z-index: 3;
            pointer-events: none;
            animation: fallAnimation linear forwards;
        }

        @keyframes fallAnimation {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, 450px) rotate(360deg); opacity: 0; }
        }

        /* --- CONTADOR --- */
        #counter-zone {
            width: 100%;
            margin-top: auto;
            padding-top: 20px;
        }

        .divider-line {
            width: 100%;
            height: 1.5px;
            background-color: #1a1a1a;
            margin: 10px 0;
        }

        .counter-title { 
            font-size: 1rem; 
            margin-bottom: 5px; 
            display: block; 
        }
        
        #timer { 
            font-size: 1.1rem; 
            font-weight: 500; 
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn" onclick="iniciarExperiencia()">Contira tu an button</button>
    </div>

    <div id="main-content">
        <div id="text-zone"></div>

        <div id="tree-zone">
            <svg class="trunk-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M50,100 L50,50 M50,80 L35,60 M50,75 L65,55 M50,65 L40,45 M50,60 L60,40" 
                stroke="#6b4226" stroke-width="4" fill="none" stroke-linecap="round"/>
            </svg>
            <div id="heart-container"></div>
        </div>

        <div id="counter-zone">
            <div class="divider-line"></div>
            <span class="counter-title">Mi amor por ti comenzó hace...</span>
            <div id="timer">Calculando...</div>
            <div class="divider-line"></div>
        </div>
    </div>

    <script>
        // Fecha exacta: 1 de Diciembre de 2025
        const startDate = new Date(2025, 11, 1, 0, 0, 0); 
        const mensajeTexto = "Flores Amarillas para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! —";
        
        let staticFlowers = []; // Guardará las flores del corazón para usarlas en la caída

        function iniciarExperiencia() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
                escribirTexto();
                crearCorazonRelleno();
                actualizarContador();
                setInterval(actualizarContador, 1000);
                
                // Las flores caen una vez que el corazón ya está lleno
                setTimeout(caidaGirasoles, 3500);
            }, 500);
        }

        function escribirTexto() {
            let i = 0;
            const zone = document.getElementById('text-zone');
            function type() {
                if (i < mensajeTexto.length) {
                    zone.innerHTML += mensajeTexto.charAt(i) === '\n' ? '<br>' : mensajeTexto.charAt(i);
                    i++;
                    setTimeout(type, 45);
                }
            }
            type();
        }

        function crearCorazonRelleno() {
            const container = document.getElementById('heart-container');
            const total = 350; // Cantidad para que se vea lleno
            
            // Centro exacto alineado con el tronco
            const centerX = 150; 
            const centerY = 110; 
            const scale = 2.8; // Tamaño ajustado para que no sea inmenso

            let count = 0;

            // Relleno matemático exacto del área de un corazón
            while(count < total) {
                let x = (Math.random() - 0.5) * 3; // Coordenada X entre -1.5 y 1.5
                let y = (Math.random() - 0.5) * 3; // Coordenada Y entre -1.5 y 1.5

                // Inecuación del corazón relleno: (x^2 + y^2 - 1)^3 - x^2 * y^3 <= 0
                if (Math.pow(x*x + y*y - 1, 3) - x*x * Math.pow(y, 3) <= 0) {
                    
                    let px = centerX + x * 30 * scale;
                    let py = centerY - y * 30 * scale; // Invertimos Y porque en pantallas Y crece hacia abajo

                    let flower = document.createElement('div');
                    flower.className = 'sunflower';
                    flower.style.left = px + 'px';
                    flower.style.top = py + 'px';
                    flower.style.opacity = '0'; // Nacen invisibles
                    
                    container.appendChild(flower);
                    staticFlowers.push(flower);
                    count++;
                }
            }

            // Mezclar el array para que aparezcan en orden aleatorio (no consecutivamente)
            staticFlowers.sort(() => Math.random() - 0.5).forEach((f, idx) => {
                setTimeout(() => {
                    f.style.opacity = '1';
                }, idx * 8); // Aparece una nueva flor cada 8 milisegundos aleatoriamente
            });
        }

        function caidaGirasoles() {
            const container = document.getElementById('heart-container');
            
            setInterval(() => {
                if (staticFlowers.length === 0) return;
                
                // Elegir una flor estática completamente al azar (de cualquier parte del corazón)
                const sourceFlower = staticFlowers[Math.floor(Math.random() * staticFlowers.length)];
                
                let falling = document.createElement('div');
                falling.className = 'sunflower falling-flower';
                // Copiar la posición exacta de la flor elegida
                falling.style.left = sourceFlower.style.left;
                falling.style.top = sourceFlower.style.top;
                
                let dur = 3 + Math.random() * 3; // Caída aleatoria entre 3 y 6 segundos
                falling.style.animationDuration = dur + 's';
                
                container.appendChild(falling);
                
                setTimeout(() => {
                    falling.remove();
                }, dur * 1000);
            }, 300); // Tira una flor cada 300ms
        }

        function actualizarContador() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            document.getElementById('timer').innerHTML = `${d} días ${h} horas ${m} minutos ${s} segundos _`;
        }
    </script>
</body>
</html>
