<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Flores Amarillas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5ebe1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* --- PANTALLA DE INICIO --- */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: #f5ebe1;
            transition: opacity 0.5s ease;
            cursor: pointer;
        }

        .sunflower-icon {
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .start-text {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #5d4037;
            border-bottom: 2px solid #fbc02d;
            padding-bottom: 5px;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex: 1;
            padding: 5vh 20px 40px 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        #text-zone {
            font-size: 1.15rem;
            line-height: 1.4;
            min-height: 130px;
            margin-bottom: 10px;
        }

        /* --- ZONA DEL ÁRBOL CORREGIDA Y ALINEADA --- */
        #tree-zone {
            position: relative;
            width: 300px;
            height: 330px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }

        /* SVG de Ramas delgadas, curvas y orgánicas que "sostienen" */
        .trunk-svg {
            position: absolute;
            bottom: 0;
            width: 140px;
            height: 160px;
            z-index: 1;
        }

        /* Contenedor del Corazón bajado para alineación */
        #heart-container {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 2;
        }

        /* --- FORMA DE GIRASOL MEJORADA (ESTILO EMOJI 🌼) --- */
        .sunflower {
            position: absolute;
            width: 14px; 
            height: 14px;
            background-color: #fce029; /* Color de pétalos */
            border-radius: 3px; /* Bordes redondeados para simular pétalos cruzados */
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease;
        }

        /* Segunda capa de pétalos girada 45 grados */
        .sunflower::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: inherit;
            border-radius: inherit;
            transform: rotate(45deg);
        }

        /* Centro café oscuro */
        .sunflower::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6.5px;
            height: 6.5px;
            background-color: #4a2e1b;
            border-radius: 50%;
            z-index: 2;
        }

        /* Animación de caída */
        .falling-flower {
            z-index: 3;
            pointer-events: none;
            animation: fallAnimation linear forwards;
        }

        @keyframes fallAnimation {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, 450px) rotate(360deg); opacity: 0; }
        }

        /* --- CONTADOR --- */
        #counter-zone {
            width: 100%;
            margin-top: auto;
            padding-top: 20px;
        }

        .divider-line {
            width: 100%;
            height: 1.5px;
            background-color: #1a1a1a;
            margin: 10px 0;
        }

        .counter-title { 
            font-size: 1rem; 
            margin-bottom: 5px; 
            display: block; 
        }
        
        #timer { 
            font-size: 1.1rem; 
            font-weight: 500; 
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="iniciarExperiencia()">
        <div class="sunflower-icon">🌻</div>
        <div class="start-text">Flores Para Ti</div>
    </div>

    <div id="main-content">
        <div id="text-zone"></div>

        <div id="tree-zone">
            <svg class="trunk-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M50,100 Q52,70 50,45" stroke="#6b4226" stroke-width="5" fill="none" stroke-linecap="round"/>
                <path d="M50,65 Q30,55 15,25" stroke="#6b4226" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M50,70 Q75,60 85,20" stroke="#6b4226" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M35,45 Q25,35 20,25" stroke="#6b4226" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M65,55 Q80,40 85,35" stroke="#6b4226" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
            <div id="heart-container"></div>
        </div>

        <div id="counter-zone">
            <div class="divider-line"></div>
            <span class="counter-title">Mi amor por ti comenzó hace...</span>
            <div id="timer">Calculando...</div>
            <div class="divider-line"></div>
        </div>
    </div>

    <script>
        // Fecha exacta: 1 de Diciembre de 2025
        const startDate = new Date(2025, 11, 1, 0, 0, 0); 
        const mensajeTexto = "Flores Amarillas para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! —";
        
        let staticFlowers = []; 

        function iniciarExperiencia() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
                escribirTexto();
                crearCorazonRelleno();
                actualizarContador();
                setInterval(actualizarContador, 1000);
                
                setTimeout(caidaGirasoles, 3500);
            }, 500);
        }

        function escribirTexto() {
            let i = 0;
            const zone = document.getElementById('text-zone');
            function type() {
                if (i < mensajeTexto.length) {
                    zone.innerHTML += mensajeTexto.charAt(i) === '\n' ? '<br>' : mensajeTexto.charAt(i);
                    i++;
                    setTimeout(type, 45);
                }
            }
            type();
        }

        // === LÓGICA DE RELLENO ALEATORIO Y PERFECTO ===
        function crearCorazonRelleno() {
            const container = document.getElementById('heart-container');
            const total = 380; // Cantidad ideal para rellenar sin saturar
            
            const centerX = 150; 
            const centerY = 110; // Posición bajada para alineación
            const scale = 75; // Escala perfecta para que el corazón no sea inmenso

            let count = 0;

            // Rejection Sampling para relleno aleatorio perfecto del área
            while(count < total) {
                let x = (Math.random() - 0.5) * 3; 
                let y = (Math.random() - 0.5) * 3; 

                // Inecuación matemática del corazón relleno
                if (Math.pow(x*x + y*y - 1, 3) - x*x * Math.pow(y, 3) <= 0) {
                    
                    let px = centerX + x * scale;
                    let py = centerY - y * scale; // Invertimos Y para pantalla

                    let flower = document.createElement('div');
                    flower.className = 'sunflower';
                    // Usamos transform para centrar el girasol en la coordenada exacta
                    flower.style.left = px + 'px';
                    flower.style.top = py + 'px';
                    // Rotación base aleatoria para que se vean desordenados naturalmente
                    flower.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 90}deg)`;
                    flower.style.opacity = '0'; 
                    
                    container.appendChild(flower);
                    staticFlowers.push(flower);
                    count++;
                }
            }

            // Desordenamos el array para que nazcan saltados y no en línea consecutiva
            staticFlowers.sort(() => Math.random() - 0.5).forEach((f, idx) => {
                setTimeout(() => {
                    f.style.opacity = '1';
                }, idx * 6); // Velocidad de aparición
            });
        }

        // Lógica de caída que selecciona de todo el corazón lleno
        function caidaGirasoles() {
            const container = document.getElementById('heart-container');
            
            setInterval(() => {
                if (staticFlowers.length === 0) return;
                
                // Clonar una flor desde cualquier parte del corazón lleno
                const sourceFlower = staticFlowers[Math.floor(Math.random() * staticFlowers.length)];
                
                let falling = document.createElement('div');
                falling.className = 'sunflower falling-flower';
                falling.style.left = sourceFlower.style.left;
                falling.style.top = sourceFlower.style.top;
                
                let dur = 3 + Math.random() * 3; 
                falling.style.animationDuration = dur + 's';
                
                container.appendChild(falling);
                
                setTimeout(() => {
                    falling.remove();
                }, dur * 1000);
            }, 300); 
        }

        function actualizarContador() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            document.getElementById('timer').innerHTML = `${d} días ${h} horas ${m} minutos ${s} segundos _`;
        }
    </script>
</body>
</html>
