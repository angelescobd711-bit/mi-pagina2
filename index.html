<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0">
    <title>Flores Amarillas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #f5ebe1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: #f5ebe1;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 12px 24px;
            font-size: 1.1rem;
            border: 1.5px solid #1a1a1a;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
        }

        #main-content {
            display: none;
            flex-direction: column;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        #text-zone {
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 20px;
            height: 120px;
        }

        /* --- CONTENEDOR ÁRBOL --- */
        #tree-zone {
            position: relative;
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .trunk-svg {
            position: absolute;
            bottom: 20px;
            width: 120px;
            height: 180px;
            z-index: 1;
        }

        .sunflower {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #fce029;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .sunflower::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background-color: #4a2e1b;
            border-radius: 50%;
        }

        .falling-flower {
            z-index: 3;
            animation: fallAnimation linear forwards;
        }

        @keyframes fallAnimation {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, 400px) rotate(360deg); opacity: 0; }
        }

        /* --- CONTADOR --- */
        #counter-zone {
            width: 100%;
            padding: 15px 0;
            margin-top: auto;
        }

        .divider-line {
            width: 100%;
            height: 1.5px;
            background-color: #1a1a1a;
            margin: 10px 0;
        }

        .counter-title { font-size: 1rem; margin-bottom: 5px; display: block; }
        #timer { font-size: 1.1rem; font-weight: 500; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn" onclick="iniciarExperiencia()">Contira tu an button</button>
    </div>

    <div id="main-content">
        <div id="text-zone"></div>

        <div id="tree-zone">
            <svg class="trunk-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M50,100 L50,60 M50,85 L35,65 M50,80 L65,60 M50,70 L40,50 M50,65 L60,45" 
                stroke="#6b4226" stroke-width="4" fill="none" stroke-linecap="round"/>
            </svg>
            <div id="heart-container" style="position: absolute; width: 100%; height: 100%;"></div>
        </div>

        <div id="counter-zone">
            <div class="divider-line"></div>
            <span class="counter-title">Mi amor por ti comenzó hace...</span>
            <div id="timer">Calculando...</div>
            <div class="divider-line"></div>
        </div>
    </div>

    <script>
        const startDate = new Date(2025, 11, 1, 0, 0, 0); 
        const mensajeTexto = "Flores Amarillas para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! —";

        function iniciarExperiencia() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
                escribirTexto();
                crearCorazonRelleno();
                setInterval(actualizarContador, 1000);
                setTimeout(caidaGirasoles, 2000);
            }, 500);
        }

        function escribirTexto() {
            let i = 0;
            const zone = document.getElementById('text-zone');
            function type() {
                if (i < mensajeTexto.length) {
                    zone.innerHTML += mensajeTexto.charAt(i) === '\n' ? '<br>' : mensajeTexto.charAt(i);
                    i++;
                    setTimeout(type, 40);
                }
            }
            type();
        }

        function crearCorazonRelleno() {
            const container = document.getElementById('heart-container');
            const total = 250; // Más flores para el relleno
            const centerX = container.clientWidth / 2;
            const centerY = 160; // Ajustado para las ramas
            const scale = 7; // Tamaño moderado

            let flores = [];

            for (let i = 0; i < total; i++) {
                // Posiciones aleatorias que solo se muestran si están dentro del corazón
                let x, y, inside = false;
                while (!inside) {
                    // Generar punto aleatorio en un cuadrado
                    let testX = (Math.random() - 0.5) * 35;
                    let testY = (Math.random() - 0.7) * 35;
                    
                    // Ecuación del corazón: (x^2 + y^2 - 1)^3 - x^2 * y^3 <= 0
                    // Ajustada para relleno
                    let normX = testX / 14;
                    let normY = testY / 14;
                    if (Math.pow(Math.pow(normX, 2) + Math.pow(normY, 2) - 1, 3) - Math.pow(normX, 2) * Math.pow(normY, 3) <= 0) {
                        x = testX;
                        y = testY;
                        inside = true;
                    }
                }

                let flower = document.createElement('div');
                flower.className = 'sunflower';
                flower.style.left = (centerX + x * scale) + 'px';
                flower.style.top = (centerY + y * scale) + 'px';
                flower.style.opacity = '0';
                container.appendChild(flower);
                flores.push(flower);
            }

            // Aparecen aleatoriamente
            flores.sort(() => Math.random() - 0.5).forEach((f, idx) => {
                setTimeout(() => f.style.opacity = '1', idx * 15);
            });
        }

        function caidaGirasoles() {
            const container = document.getElementById('heart-container');
            setInterval(() => {
                const flowers = document.querySelectorAll('.sunflower:not(.falling-flower)');
                if (flowers.length === 0) return;
                
                // Selecciona cualquiera de todo el corazón
                const source = flowers[Math.floor(Math.random() * flowers.length)];
                
                let falling = document.createElement('div');
                falling.className = 'sunflower falling-flower';
                falling.style.left = source.style.left;
                falling.style.top = source.style.top;
                
                let dur = 4 + Math.random() * 3;
                falling.style.animationDuration = dur + 's';
                
                container.appendChild(falling);
                setTimeout(() => falling.remove(), dur * 1000);
            }, 300);
        }

        function actualizarContador() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerHTML = `${d} días ${h} horas ${m} minutos ${s} segundos`;
        }
    </script>
</body>
</html>
