<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Flores Amarillas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5ebe1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* --- PANTALLA DE INICIO (Restaurada al original) --- */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: #f5ebe1;
            transition: opacity 0.5s ease;
            cursor: pointer;
        }

        .sunflower-icon {
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .start-text {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #5d4037;
            border-bottom: 2px solid #fbc02d;
            padding-bottom: 5px;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex: 1;
            padding: 5vh 20px 40px 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        #text-zone {
            font-size: 1.15rem;
            line-height: 1.4;
            min-height: 130px;
            margin-bottom: 10px;
        }

        /* --- ZONA DEL ÁRBOL --- */
        #tree-zone {
            position: relative;
            width: 300px;
            height: 320px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }

        /* Tronco más grande y conectado al corazón */
        .trunk-svg {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 160px;
            z-index: 1;
        }

        #heart-container {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 2;
        }

        .sunflower {
            position: absolute;
            width: 14px; /* Tamaño ligeramente ajustado para mayor definición */
            height: 14px;
            background-color: #fce029;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease;
        }

        .sunflower::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background-color: #4a2e1b;
            border-radius: 50%;
        }

        .falling-flower {
            z-index: 3;
            pointer-events: none;
            animation: fallAnimation linear forwards;
        }

        @keyframes fallAnimation {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, 450px) rotate(360deg); opacity: 0; }
        }

        /* --- CONTADOR --- */
        #counter-zone {
            width: 100%;
            margin-top: auto;
            padding-top: 20px;
        }

        .divider-line {
            width: 100%;
            height: 1.5px;
            background-color: #1a1a1a;
            margin: 10px 0;
        }

        .counter-title { 
            font-size: 1rem; 
            margin-bottom: 5px; 
            display: block; 
        }
        
        #timer { 
            font-size: 1.1rem; 
            font-weight: 500; 
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="iniciarExperiencia()">
        <div class="sunflower-icon">🌻</div>
        <div class="start-text">Flores Para Ti</div>
    </div>

    <div id="main-content">
        <div id="text-zone"></div>

        <div id="tree-zone">
            <svg class="trunk-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M50,100 Q48,60 50,25" stroke="#6b4226" stroke-width="4.5" fill="none" stroke-linecap="round"/>
                <path d="M50,70 Q35,50 25,35" stroke="#6b4226" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M50,65 Q65,45 75,30" stroke="#6b4226" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M50,45 Q40,30 35,20" stroke="#6b4226" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M50,40 Q60,25 65,15" stroke="#6b4226" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
            <div id="heart-container"></div>
        </div>

        <div id="counter-zone">
            <div class="divider-line"></div>
            <span class="counter-title">Mi amor por ti comenzó hace...</span>
            <div id="timer">Calculando...</div>
            <div class="divider-line"></div>
        </div>
    </div>

    <script>
        // Fecha exacta: 1 de Diciembre de 2025
        const startDate = new Date(2025, 11, 1, 0, 0, 0); 
        const mensajeTexto = "Flores Amarillas para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! —";
        
        let staticFlowers = []; 

        function iniciarExperiencia() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
                escribirTexto();
                crearCorazonRelleno();
                actualizarContador();
                setInterval(actualizarContador, 1000);
                
                setTimeout(caidaGirasoles, 3500);
            }, 500);
        }

        function escribirTexto() {
            let i = 0;
            const zone = document.getElementById('text-zone');
            function type() {
                if (i < mensajeTexto.length) {
                    zone.innerHTML += mensajeTexto.charAt(i) === '\n' ? '<br>' : mensajeTexto.charAt(i);
                    i++;
                    setTimeout(type, 45);
                }
            }
            type();
        }

        function crearCorazonRelleno() {
            const container = document.getElementById('heart-container');
            const total = 400; // Mayor densidad para mejor forma de corazón
            
            const centerX = 150; 
            const centerY = 110; 
            const scaleX = 35; // Escala X ajustada para anchura
            const scaleY = 32; // Escala Y ajustada para altura (Mantiene el tamaño global)

            let count = 0;

            // Relleno matemático
            while(count < total) {
                let x = (Math.random() - 0.5) * 3; 
                let y = (Math.random() - 0.5) * 3; 

                // Fórmula matemática del corazón relleno
                if (Math.pow(x*x + y*y - 1, 3) - x*x * Math.pow(y, 3) <= 0) {
                    
                    let px = centerX + x * scaleX;
                    let py = centerY - y * scaleY; 

                    let flower = document.createElement('div');
                    flower.className = 'sunflower';
                    flower.style.left = px + 'px';
                    flower.style.top = py + 'px';
                    flower.style.opacity = '0'; 
                    
                    container.appendChild(flower);
                    staticFlowers.push(flower);
                    count++;
                }
            }

            // Mezclar para aparición aleatoria
            staticFlowers.sort(() => Math.random() - 0.5).forEach((f, idx) => {
                setTimeout(() => {
                    f.style.opacity = '1';
                }, idx * 7); 
            });
        }

        function caidaGirasoles() {
            const container = document.getElementById('heart-container');
            
            setInterval(() => {
                if (staticFlowers.length === 0) return;
                
                // Cae de cualquier punto del corazón
                const sourceFlower = staticFlowers[Math.floor(Math.random() * staticFlowers.length)];
                
                let falling = document.createElement('div');
                falling.className = 'sunflower falling-flower';
                falling.style.left = sourceFlower.style.left;
                falling.style.top = sourceFlower.style.top;
                
                let dur = 3 + Math.random() * 3; 
                falling.style.animationDuration = dur + 's';
                
                container.appendChild(falling);
                
                setTimeout(() => {
                    falling.remove();
                }, dur * 1000);
            }, 300); 
        }

        function actualizarContador() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            document.getElementById('timer').innerHTML = `${d} días ${h} horas ${m} minutos ${s} segundos _`;
        }
    </script>
</body>
</html>
