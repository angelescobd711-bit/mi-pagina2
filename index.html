<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flores Amarillas</title>
    <style>
        :root {
            --bg-color: #fcf6f0;
            --text-color: #5d4037;
            --sunflower-yellow: #fdd835;
        }

        /* Bloqueo estricto de movimiento y zoom para iPhone */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background-color: var(--bg-color);
            font-family: -apple-system, system-ui, sans-serif;
        }

        #main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Texto con efecto de escritura */
        .text-container {
            width: 100%;
            max-width: 350px;
            min-height: 150px;
            text-align: left;
            font-size: 1.1rem;
            color: var(--text-color);
            line-height: 1.4;
            font-weight: 500;
        }

        /* Área del Árbol */
        .tree-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .trunk {
            width: 12px;
            height: 100px;
            background: #8d6e63;
            border-radius: 5px;
            position: relative;
            z-index: 1;
        }

        /* Ramas simples */
        .trunk::before, .trunk::after {
            content: '';
            position: absolute;
            background: #8d6e63;
            width: 8px;
            height: 50px;
            border-radius: 5px;
        }
        .trunk::before { transform: rotate(35deg); left: 10px; top: 20px; }
        .trunk::after { transform: rotate(-35deg); right: 10px; top: 10px; }

        /* Corazón de Girasoles */
        #sunflower-heart {
            position: absolute;
            width: 100%;
            height: 100%;
            top: -40px;
            left: 0;
            z-index: 2;
        }

        .flower {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--sunflower-yellow);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .flower::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #5d4037;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Animación de caída */
        .falling-flower {
            position: absolute;
            z-index: 3;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(400px) rotate(360deg); opacity: 0; }
        }

        /* Contador */
        .counter-container {
            width: 90%;
            background: rgba(255,255,255,0.7);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #e0d5cb;
        }

        #timer {
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-color);
            margin-top: 5px;
        }

        .label { font-size: 0.8rem; color: #8d6e63; }

    </style>
</head>
<body>

<div id="main-wrapper">
    <div class="text-container" id="typewriter"></div>

    <div class="tree-container">
        <div id="sunflower-heart"></div>
        <div class="trunk"></div>
    </div>

    <div class="counter-container">
        <span class="label">Mi amor por ti comenzó hace...</span>
        <div id="timer">Cargando...</div>
    </div>
</div>

<script>
    // 1. CONFIGURACIÓN: Fecha 1 de Diciembre
    const startDate = new Date(2025, 11, 1, 0, 0, 0); // Mes 11 es Diciembre en JS
    
    const text = "Flores Amarillas para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! —";

    // 2. EFECTO ESCRITURA
    let charIndex = 0;
    function type() {
        if (charIndex < text.length) {
            document.getElementById("typewriter").innerHTML += text.charAt(charIndex) === "\n" ? "<br>" : text.charAt(charIndex);
            charIndex++;
            setTimeout(type, 60);
        }
    }

    // 3. CREAR EL CORAZÓN LLENO (IGUAL AL VIDEO)
    function createHeart() {
        const container = document.getElementById("sunflower-heart");
        const totalFlowers = 150; 
        for (let i = 0; i < totalFlowers; i++) {
            const t = (i / totalFlowers) * Math.PI * 2;
            // Ecuación de corazón
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            
            const flower = document.createElement("div");
            flower.className = "flower";
            flower.style.left = `calc(50% + ${x * 7}px)`; 
            flower.style.top = `calc(50% + ${y * 7}px)`;
            flower.style.transform = `rotate(${Math.random() * 360}deg) scale(${0.7 + Math.random()})`;
            container.appendChild(flower);
        }
    }

    // 4. ANIMACIÓN DE CAÍDA (SALEN DEL CORAZÓN)
    function spawnFallingFlower() {
        const heart = document.getElementById("sunflower-heart");
        const f = document.createElement("div");
        f.className = "flower falling-flower";
        
        // Posición inicial aleatoria dentro del área del corazón
        f.style.left = Math.random() * 100 + "%";
        f.style.top = Math.random() * 60 + "%";
        
        const duration = 3 + Math.random() * 3;
        f.style.animationDuration = duration + "s";
        
        document.querySelector(".tree-container").appendChild(f);
        
        setTimeout(() => f.remove(), duration * 1000);
    }

    // 5. RELOJ
    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);

        document.getElementById("timer").innerText = `${d} días | ${h} horas | ${m} min | ${s} seg`;
    }

    // INICIAR TODO
    window.onload = () => {
        createHeart();
        type();
        setInterval(spawnFallingFlower, 300); // Caen girasoles continuamente
        setInterval(updateTimer, 1000);
    };
</script>

</body>
</html>
