<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Flores Amarillas</title>
    <style>
        /* === RESET Y BLOQUEO DE ZOOM === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5ebe1; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* === PANTALLA DE BOTÓN INICIAL (BLOQUEADO) === */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: #f5ebe1;
            transition: opacity 0.5s ease;
            cursor: pointer;
        }

        .sunflower-icon {
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .click-text {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #5d4037;
            border-bottom: 2px solid #fbc02d;
            padding-bottom: 5px;
        }

        /* === CONTENIDO PRINCIPAL === */
        #main-content {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex: 1;
            padding: 5vh 20px 40px 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Texto superior (BLOQUEADO) */
        #text-zone {
            font-size: 1.15rem;
            line-height: 1.4;
            min-height: 130px;
            margin-bottom: 10px;
        }

        .blinking {
            font-weight: bold;
            display: inline-block;
            animation: blinker 1.5s infinite;
        }

        @keyframes blinker { 50% { opacity: 0; } }

        /* === ZONA DEL ÁRBOL === */
        #tree-zone {
            position: relative;
            width: 300px;
            height: 350px;
            margin: 0 auto;
        }

        /* Tronco Centrado al 100% (BLOQUEADO) */
        .trunk-svg {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%); 
            width: 140px;
            height: 150px;
            z-index: 1;
        }

        /* Contenedor del Corazón (BLOQUEADO) */
        #heart-container {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 2;
        }

        /* Girasoles Individuales (BLOQUEADO) */
        .sunflower {
            position: absolute;
            width: 16px; 
            height: 16px;
            background-color: #fce029; 
            border-radius: 4px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease;
        }

        .sunflower::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: inherit;
            border-radius: inherit;
            transform: rotate(45deg);
        }

        .sunflower::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6.5px; 
            height: 6.5px;
            background-color: #4a2e1b;
            border-radius: 50%;
            z-index: 2;
        }

        /* Animación de caída (BLOQUEADO) */
        .falling-flower {
            z-index: 3;
            pointer-events: none;
            animation: fallAnimation linear forwards;
        }

        @keyframes fallAnimation {
            0% { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, 450px) rotate(360deg); opacity: 0; }
        }

        /* === PASTO CON MOVIMIENTO (BLOQUEADO) === */
        #grass-zone {
            position: relative;
            width: 300px;
            height: 30px; 
            margin: -40px auto 10px auto; 
            z-index: 4; 
            overflow: hidden; 
            display: flex;
            align-items: flex-end; 
            justify-content: center;
        }

        .grass-blade {
            width: 3px;
            height: 20px; 
            background-color: #7cb342; 
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            margin: 0 1px; 
            transform-origin: bottom center; 
            animation: windSway 4s ease-in-out infinite;
        }

        .grass-blade:nth-child(even) { background-color: #8bc34a; }
        .grass-blade:nth-child(3n) { background-color: #9ccc65; }

        @keyframes windSway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); } 
        }

        /* === NUEVO: PAJARITOS ANIMADOS === */
        .bird {
            position: absolute;
            width: 22px; height: 18px;
            background-color: #795548; /* Marrón orgánico */
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            z-index: 3; /* Arriba del corazón */
            opacity: 0; display: none; /* Estado inicial: oculto */
            transition: opacity 1s, left 3s ease-out, top 3s ease-out; /* Transiciones suaves de vuelo */
        }

        /* Alas, Pico y Ojos de los pajaritos */
        .bird-body { position: relative; width: 100%; height: 100%; }
        
        .bird-wing {
            position: absolute; top: 1px; left: -1px;
            width: 14px; height: 10px;
            background-color: #a1887f; /* Color de ala */
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            transform: rotate(-10deg);
        }

        .bird-beak {
            position: absolute; top: 6px; left: -4px;
            width: 0; height: 0;
            border-top: 2px solid transparent;
            border-bottom: 2px solid transparent;
            border-right: 5px solid #ff9800; /* Pico naranja */
        }

        .bird-eye {
            position: absolute; top: 4px; left: 3px;
            width: 3px; height: 3px;
            background-color: #fff;
            border-radius: 50%;
        }

        .bird-eye::after {
            content: ''; position: absolute; top: 1px; left: 1px;
            width: 1px; height: 1px; background-color: #000; border-radius: 50%;
        }

        /* Voltear pajaritos que miran a la izquierda */
        .bird.facing-left { transform: scaleX(-1); }

        /* Estado posado con animación de "bamboleo" suave */
        .bird.perched {
            animation: birdPerchBreathe 5s ease-in-out infinite;
        }

        @keyframes birdPerchBreathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.05); }
        }

        /* === CONTADOR (BLOQUEADO) === */
        #counter-zone {
            width: 100%;
            margin-top: auto; 
            padding-top: 20px;
        }

        .divider-line {
            width: 100%;
            height: 1.5px;
            background-color: #1a1a1a;
            margin: 10px 0;
        }

        .counter-title { font-size: 1rem; margin-bottom: 5px; display: block; }
        #timer { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="start-screen" onclick="iniciarExperiencia()">
        <div class="sunflower-icon">🌻</div>
        <div class="click-text">Flores Para Ti</div>
    </div>

    <div id="main-content">
        <div id="text-zone"></div>

        <div id="tree-zone">
            <svg class="trunk-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M 35 100 C 40 80, 45 60, 45 40 C 35 30, 20 25, 10 20 C 20 25, 35 35, 45 40 C 45 25, 40 10, 35 0 C 45 15, 50 30, 50 40 C 60 30, 75 25, 85 20 C 75 25, 60 35, 52 42 C 55 60, 60 80, 65 100 Z" fill="#6b4226"/>
            </svg>
            <div id="heart-container"></div>
        </div>

        <div id="grass-zone"></div>

        <div id="counter-zone">
            <div class="divider-line"></div>
            <span class="counter-title">Mi amor por ti comenzó hace...</span>
            <div id="timer">Calculando...</div>
            <div class="divider-line"></div>
        </div>
    </div>

    <script>
        const startDate = new Date(2025, 11, 1, 0, 0, 0); 
        const message = "Flores Amarillas para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! —";

        let charIndex = 0;
        let staticFlowers = []; 
        let staticBirds = []; // Guardará los objetos de pajaritos para el ciclo

        function iniciarExperiencia() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
                typeWriterText();
                drawHeart(); 
                createGrass(); 
                
                // Iniciar componente de pajaritos animados
                initializeBirdsCycle(); 
                
                setTimeout(startFallingFlowers, 3500); 
                
                actualizarContador();
                setInterval(actualizarContador, 1000);
            }, 500);
        }

        function typeWriterText() {
            if (charIndex < message.length) {
                const char = message.charAt(charIndex);
                if (message.substring(charIndex, charIndex + 17) === "— I Love You! —") {
                    document.getElementById('text-zone').innerHTML += '<span class="blinking">I Love You!</span>';
                    charIndex += 17;
                } else {
                    document.getElementById('text-zone').innerHTML += char === '\n' ? '<br>' : char;
                    charIndex++;
                }
                setTimeout(typeWriterText, 60);
            }
        }

        function drawHeart() {
            const container = document.getElementById('heart-container');
            // Verificación matemática de alineación perfecta sobre tronco BLOQUEADA
            const centerX = 138; 
            const centerY = 135; 
            const scaleX = 78; 
            const scaleY = 82; 
            
            const step = 0.15;
            const rowSpacing = step * 0.866; 

            let row = 0;

            for (let y = -1.5; y <= 1.5; y += rowSpacing) {
                let offsetX = (row % 2 === 0) ? 0 : step / 2;
                
                for (let x = -1.5; x <= 1.5; x += step) {
                    let jx = x + offsetX - (step / 4);
                    let jy = y;

                    if (Math.pow(jx*jx + jy*jy - 1, 3) - jx*jx * Math.pow(jy, 3) <= 0) {
                        
                        let px = centerX + jx * scaleX;
                        let py = centerY - jy * scaleY;

                        let flower = document.createElement('div');
                        flower.className = 'sunflower';
                        flower.style.left = px + 'px';
                        flower.style.top = py + 'px';
                        
                        let randomScale = 0.75 + Math.random() * 0.5;
                        let randomRotate = Math.random() * 360;
                        flower.style.transform = `translate(-50%, -50%) rotate(${randomRotate}deg) scale(${randomScale})`;
                        flower.style.opacity = '0'; 
                        
                        container.appendChild(flower);
                        staticFlowers.push(flower);
                    }
                }
                row++;
            }

            staticFlowers.sort(() => Math.random() - 0.5).forEach((f, idx) => {
                setTimeout(() => {
                    f.style.opacity = '1';
                }, idx * 5); 
            });
        }

        function createGrass() {
            const container = document.getElementById('grass-zone');
            const numBlades = 60; 

            for (let i = 0; i < numBlades; i++) {
                let blade = document.createElement('div');
                blade.className = 'grass-blade';
                
                let randomHeight = 15 + Math.random() * 15; 
                let randomDelay = Math.random() * 4; 
                let randomDuration = 3 + Math.random() * 2; 

                blade.style.height = randomHeight + 'px';
                blade.style.animationDelay = randomDelay + 's';
                blade.style.animationDuration = randomDuration + 's';

                container.appendChild(blade);
            }
        }

        // === NUEVO: INICIALIZACIÓN Y LÓGICA DE CICLO DE PAJARITOS ===
        function initializeBirdsCycle() {
            const treeZone = document.getElementById('tree-zone');
            
            // Definimos las coordenadas exactas de posado en las ramas señaladas
            const perchPositions = [
                { id: 1, left: 110, top: 170, facing: 'right' }, // Rama izquierda en el corazón
                { id: 2, left: 210, top: 190, facing: 'left' }   // Rama derecha en el corazón
            ];

            // 1. Crear elementos DOM para los pajaritos
            perchPositions.forEach(pos => {
                let bird = document.createElement('div');
                bird.className = `bird ${pos.facing === 'left' ? 'facing-left' : ''}`;
                bird.id = `bird-${pos.id}`;

                let body = document.createElement('div'); body.className = 'bird-body';
                let wing = document.createElement('div'); wing.className = 'bird-wing';
                let beak = document.createElement('div'); beak.className = 'bird-beak';
                let eye = document.createElement('div'); eye.className = 'bird-eye';

                body.appendChild(wing); body.appendChild(beak); body.appendChild(eye);
                bird.appendChild(body);
                treeZone.appendChild(bird);

                staticBirds.push({ element: bird, data: pos });
            });

            // 2. Programar el ciclo de cada pajarito (llegar, posarse, irse, volver)
            staticBirds.forEach(birdObj => startBirdCycleController(birdObj));
        }

        function startBirdCycleController(birdObj) {
            // Función interna para gestionar las etapas del ciclo
            function arriveAndPerch() {
                const element = birdObj.element;
                const pos = birdObj.data;

                // Paso 1: Configurar estado inicial oculto fuera de pantalla (arriba)
                element.style.display = 'block';
                element.style.opacity = '0';
                // Salen de un lado aleatorio arriba
                const startOff = pos.facing === 'left' ? 350 : -50;
                element.style.left = startOff + 'px';
                element.style.top = '-50px';

                // Paso 2: Volar hacia la rama (Transición de CSS activada)
                setTimeout(() => { // Pequeño retraso para que se registre el estado inicial
                    element.style.transition = 'opacity 1s, left 3s ease-out, top 3s ease-out';
                    element.style.left = pos.left + 'px';
                    element.style.top = pos.top + 'px';
                    element.style.opacity = '1';
                }, 100);

                // Paso 3: Posarse (después del tiempo de vuelo)
                setTimeout(() => {
                    element.style.transition = ''; // Reset transition para evitar desfases
                    element.classList.add('perched'); // Activa la animación suave de bamboleo
                }, 3100);

                // Paso 4: Quedarse 15 segundos y luego irse
                setTimeout(leave, 15000); // Se quedan 15s posados
            }

            function leave() {
                const element = birdObj.element;
                const pos = birdObj.data;

                element.classList.remove('perched'); // Desactiva bamboleo
                
                // Configurar transición de vuelo de salida (más rápida)
                element.style.transition = 'opacity 1s, left 2s ease-in, top 2s ease-in';
                
                // Salen volando hacia arriba y el lado contrario
                const endOff = pos.facing === 'left' ? -100 : 400;
                element.style.left = endOff + 'px';
                element.style.top = '-80px';
                element.style.opacity = '0';

                // Paso 5: Ocultar completamente y programar el regreso periódicamente
                setTimeout(resetAndWait, 2100); // Tiempo de vuelo de salida
            }

            function resetAndWait() {
                const element = birdObj.element;
                element.style.display = 'none'; // Desaparece del lienzo principal
                element.style.transition = ''; // Limpia transiciones

                // Paso 6: Tiempo de espera para volver (Periódico, 40-60 segundos aleatorios)
                const waitTime = 40000 + Math.random() * 20000;
                setTimeout(arriveAndPerch, waitTime); 
            }

            // Iniciar primer ciclo con un retraso inicial aleatorio para no salir juntos
            setTimeout(arriveAndPerch, (5000 + Math.random() * 10000));
        }

        // === CAÍDA GIRASOLES (BLOQUEADO) ===
        function startFallingFlowers() {
            const container = document.getElementById('heart-container');
            
            setInterval(() => {
                if (staticFlowers.length === 0) return;
                
                const sourceFlower = staticFlowers[Math.floor(Math.random() * staticFlowers.length)];
                
                let falling = document.createElement('div');
                falling.className = 'sunflower falling-flower';
                falling.style.left = sourceFlower.style.left;
                falling.style.top = sourceFlower.style.top;
                
                let duration = 3 + Math.random() * 3; 
                falling.style.animationDuration = duration + 's';
                
                container.appendChild(falling);
                
                setTimeout(() => {
                    falling.remove();
                }, duration * 1000);
            }, 300); 
        }

        function actualizarContador() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            document.getElementById('timer').innerHTML = 
                `${d} días ${h} horas ${m} minutos ${s} segundos _`;
        }
    </script>
</body>
</html>
